{% set name = "defopt" %}
{% set version = "7.0.0" %}


package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/defopt-{{ version }}.tar.gz
  sha256: d7ac98810005880717e1df62527fd35dfe083f551b6d4fb5da0b25f608e8ef4c

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - pip
    - python {{ python_min }}
    - setuptools-scm >=3.3
    - setuptools
  run:
    - python >={{ python_min }}
    - typing_inspect >=0.5.0
    - docutils >=0.12
    - sphinxcontrib-napoleon >=0.7.0
    - colorama >=0.3.4

test:
  imports:
    - defopt
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/anntzer/defopt
  summary: Effortless argument parser
  license: MIT
  license_file: LICENSE.txt

extra:
  recipe-maintainers:
    - ickc
    - nh13
